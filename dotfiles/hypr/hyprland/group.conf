group {
    col.border_active = rgb(ff0000)
    col.border_inactive = rgb(ee0000)

    groupbar {
        font_family = JetBrains Mono NF
        font_size = 15
        gradients = true
        gradient_round_only_edges = false
        gradient_rounding = 5
        height = 25
        indicator_height = 0
        gaps_in = 3
        gaps_out = 3

        text_color = rgb(ffffff)
        col.active = rgba(ff0000ff)
        col.inactive = rgba(ee0000ee)
    }
}
